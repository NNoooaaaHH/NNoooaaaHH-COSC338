<script id="vertex-shader" type="x-shader/x-vertex">
#version 300 es

uniform mat4 uModelViewMatrix;
uniform mat4 uProjectionMatrix;
uniform mat3 uNormalMatrix;
uniform mat4 uRotationMatrix;

uniform vec4 uLightPosition;

uniform vec4 uMatAmbient;
uniform vec4 uMatDiffuse;
uniform vec4 uMatSpecular;
uniform float uShininess;

uniform highp int uUsePhong;

in vec4 aPosition;
in vec3 aNormal;

out vec4 vColor;
out vec3 vNormal;
out vec3 vPos;

void main() {

    vec4 vertPos4 = uModelViewMatrix * aPosition;
    vec3 vertPos = vertPos4.xyz / vertPos4.w;

    vec3 N = normalize(uNormalMatrix * aNormal);
    vec3 L = normalize(uLightPosition.xyz - vertPos);

    vNormal = N;
    vPos = vertPos;


    float lambertian = max(dot(N, L), 0.0);

    float specular = 0.0;
    if (lambertian > 0.0) {
      vec3 R = reflect(-L, N);
      vec3 V = normalize(-vertPos);
      float specAngle = max(dot(R, V), 0.0);
      specular = pow(specAngle, uShininess);
    }

    vColor = uMatAmbient + uMatDiffuse * lambertian + uMatSpecular * specular;

    gl_Position = uProjectionMatrix * uModelViewMatrix * uRotationMatrix * aPosition;
}
</script>


<script id="fragment-shader" type="x-shader/x-fragment">
#version 300 es
precision highp float;
uniform highp int uUsePhong;

uniform vec4 uLightPosition;

uniform vec4 uMatAmbient;
uniform vec4 uMatDiffuse;
uniform vec4 uMatSpecular;
uniform float uShininess;

in vec4 vColor;
in vec3 vNormal;
in vec3 vPos;

out vec4 fColor;

void main() {

    if (uUsePhong == 0) {
        fColor = vColor;
    } else {
      vec3 N = normalize(vNormal);
      vec3 L = normalize(uLightPosition.xyz - vPos);

        float lambertian = max(dot(N, L), 0.0);

        float specular = 0.0;
        if (lambertian > 0.0) {
          vec3 R = reflect(-L, N);
          vec3 V = normalize(-vPos);
          float specAngle = max(dot(R, V), 0.0);
          specular = pow(specAngle, uShininess);
        }

        fColor = uMatAmbient + uMatDiffuse * lambertian + uMatSpecular * specular;
    }
}
</script>
